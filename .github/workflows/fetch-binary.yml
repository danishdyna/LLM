name: Fetch Binary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Download binary
        run: |
          curl -L https://ollama.com/download/ollama-linux-amd64.tar.zst -o linux-amd64.tar.zst

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fetch-binary
          name: Binary
          files: linux-amd64.tar.zst
